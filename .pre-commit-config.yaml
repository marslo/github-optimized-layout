# yamllint disable rule:indentation
---
# pin the Node used by node-language hooks (stylelint) to an LTS whose npm (10.x)
# still tolerates the deprecated `--ignore-prepublish` flag that pre-commit 4.6.x
# passes during hook install. Node 24+/npm 11 hard-error on it (EUNKNOWNCONFIG).
default_language_version:
  node: 22.11.0

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        name: Trim Trailing Whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        name: End Of File Fixer
      - id: check-yaml
        name: Check YAML
        args: ["--unsafe"]
      - id: check-json
        name: Check JSON
      - id: check-merge-conflict
        name: Check Merge Conflict
      - id: check-case-conflict
        name: Check Case Conflict
      - id: mixed-line-ending
        name: Mixed Line Ending
        args: ["--fix=lf"]

  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
      - id: forbid-crlf
        name: Forbid CRLF Line Endings
      - id: remove-crlf
        name: Remove CRLF Line Endings
      - id: remove-tabs
        name: Remove Tabs (2 spaces)
        args: [--whitespaces-count, '2']

  - repo: https://github.com/thibaudcolas/pre-commit-stylelint
    rev: v17.14.1
    hooks:
      - id: stylelint
        name: Stylelint
        additional_dependencies:
          - 'stylelint@17.11.0'
        args: ['--fix']
        files: '\.css$'

  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos
        name: Typos
        args: ['--write-changes', '--force-exclude']
